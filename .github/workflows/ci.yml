name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  baseline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        if: hashFiles('**/pyproject.toml', '**/requirements.txt', '**/setup.py') != ''
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Python baseline checks
        if: hashFiles('**/pyproject.toml', '**/requirements.txt', '**/setup.py') != ''
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install pytest || true

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt || true
          fi

          if [ -f pyproject.toml ] || [ -f setup.py ]; then
            pip install -e . || true
          fi

          if [ -d tests ]; then
            pytest -q
          else
            echo "No root tests directory; skipping pytest"
          fi

      - name: Set up Node
        if: hashFiles('**/package.json') != ''
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Node baseline checks
        if: hashFiles('**/package.json') != ''
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            npm ci || npm install
          else
            npm install
          fi
          npm test --if-present

      - name: Baseline summary
        run: echo "Baseline CI passed"

