name: Sync Live Metrics

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 06:00 UTC
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/scripts/sync_metrics.py'
      - '.github/scripts/check_metrics.py'
      - '.github/workflows/sync-metrics.yml'
      - 'tests/fixtures/stale_index.html'

permissions:
  contents: write

jobs:
  self-test:
    # Runs on every trigger. Catches regressions in sync_metrics.py /
    # check_metrics.py before they can corrupt index.html on main.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Self-test — sync fixes every stale variant
        env:
          APPS: '18'
          TESTS: '900'
          GOV: '18/18'
        run: |
          cp tests/fixtures/stale_index.html /tmp/fresh.html
          python3 .github/scripts/sync_metrics.py /tmp/fresh.html
          python3 .github/scripts/check_metrics.py /tmp/fresh.html

      - name: Self-test — guard rejects raw stale fixture
        env:
          APPS: '18'
          TESTS: '900'
          GOV: '18/18'
        run: |
          if python3 .github/scripts/check_metrics.py tests/fixtures/stale_index.html; then
            echo "::error::regression guard failed to flag raw stale fixture"
            exit 1
          fi
          echo "guard correctly flagged raw stale fixture"

      - name: Self-test — recover from PR#10-style buggy sync
        env:
          APPS: '18'
          TESTS: '900'
          GOV: '18/18'
        run: |
          # Simulates the exact PR #10 residue: data-count updated to 18 but
          # inner text still 59. sync_metrics.py must self-align inner text.
          cat > /tmp/buggy.html <<'HTML'
          <!DOCTYPE html><html><body>
          <strong data-count="18" data-suffix="">59</strong>
          <strong data-count="900" data-suffix="+">800+</strong>
          <span data-en="18/18 governance" data-tr="59/59 yönetişim">18/18 governance</span>
          </body></html>
          HTML
          python3 .github/scripts/sync_metrics.py /tmp/buggy.html
          python3 .github/scripts/check_metrics.py /tmp/buggy.html

  sync:
    # Only runs on scheduled / manual triggers — PRs stop at self-test.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: self-test
    steps:
      - uses: actions/checkout@v6

      - name: Fetch metrics from GitHub profile README
        id: metrics
        run: |
          README=$(curl -sf https://raw.githubusercontent.com/yakuphanycl/yakuphanycl/main/README.md)
          # Patterns tolerate optional Markdown bold (**N**, **N+**, **N/M**) around digits.
          # `|| true` keeps the step alive under `bash -e` if a pattern finds zero matches;
          # the downstream step gates on non-empty outputs before acting.
          APPS=$(echo "$README" | grep -oP '\|\s*\*{0,2}\K\d+(?=\*{0,2}\s*apps)' | head -1 || true)
          TESTS=$(echo "$README" | grep -oP '\|\s*\*{0,2}\K\d+(?=\+?\*{0,2}\s*tests)' | head -1 || true)
          GOV=$(echo "$README" | grep -oP '\*{0,2}\K\d+/\d+(?=\*{0,2}\s*governance)' | head -1 || true)
          echo "apps=$APPS" >> "$GITHUB_OUTPUT"
          echo "tests=$TESTS" >> "$GITHUB_OUTPUT"
          echo "gov=$GOV" >> "$GITHUB_OUTPUT"
          echo "Found: apps=$APPS tests=$TESTS gov=$GOV"

      - name: Update index.html
        if: steps.metrics.outputs.apps != '' && steps.metrics.outputs.tests != ''
        env:
          APPS: ${{ steps.metrics.outputs.apps }}
          TESTS: ${{ steps.metrics.outputs.tests }}
          GOV: ${{ steps.metrics.outputs.gov }}
        run: python3 .github/scripts/sync_metrics.py index.html

      - name: Regression guard — verify no stale residue
        if: steps.metrics.outputs.apps != '' && steps.metrics.outputs.tests != ''
        env:
          APPS: ${{ steps.metrics.outputs.apps }}
          TESTS: ${{ steps.metrics.outputs.tests }}
          GOV: ${{ steps.metrics.outputs.gov }}
        run: python3 .github/scripts/check_metrics.py index.html

      - name: Commit and push
        if: steps.metrics.outputs.apps != '' && steps.metrics.outputs.tests != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: sync live metrics (apps=${{ steps.metrics.outputs.apps }}, tests=${{ steps.metrics.outputs.tests }})"
          git push
