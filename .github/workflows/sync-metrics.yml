name: Sync Live Metrics

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 06:00 UTC
  workflow_dispatch:       # Manual trigger

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch metrics from GitHub profile README
        id: metrics
        run: |
          README=$(curl -sf https://raw.githubusercontent.com/yakuphanycl/yakuphanycl/main/README.md)
          # Patterns tolerate optional Markdown bold (**N**, **N+**, **N/M**) around digits.
          # `|| true` keeps the step alive under `bash -e` if a pattern finds zero matches;
          # the downstream step gates on non-empty outputs before acting.
          APPS=$(echo "$README" | grep -oP '\|\s*\*{0,2}\K\d+(?=\*{0,2}\s*apps)' | head -1 || true)
          TESTS=$(echo "$README" | grep -oP '\|\s*\*{0,2}\K\d+(?=\+?\*{0,2}\s*tests)' | head -1 || true)
          GOV=$(echo "$README" | grep -oP '\*{0,2}\K\d+/\d+(?=\*{0,2}\s*governance)' | head -1 || true)
          echo "apps=$APPS" >> "$GITHUB_OUTPUT"
          echo "tests=$TESTS" >> "$GITHUB_OUTPUT"
          echo "gov=$GOV" >> "$GITHUB_OUTPUT"
          echo "Found: apps=$APPS tests=$TESTS gov=$GOV"

      - name: Update index.html
        if: steps.metrics.outputs.apps != '' && steps.metrics.outputs.tests != ''
        env:
          APPS: ${{ steps.metrics.outputs.apps }}
          TESTS: ${{ steps.metrics.outputs.tests }}
          GOV: ${{ steps.metrics.outputs.gov }}
        run: |
          python3 <<'PY'
          import os, re, sys
          from pathlib import Path

          file = Path("index.html")
          apps = os.environ["APPS"]
          tests = os.environ["TESTS"]
          gov = os.environ.get("GOV", "")

          content = file.read_text(encoding="utf-8")

          # data-count attributes appear as `<strong data-count="N" ...>` in two
          # adjacent rows (tests first, apps second) — the text "apps" / "tests"
          # lives on separate lines, so regex co-location would miss them.
          counts = re.findall(r'data-count="(\d+)"', content)
          if len(counts) < 2:
              print("WARN: fewer than 2 data-count attributes; skipping update")
              sys.exit(0)
          old_tests, old_apps = counts[0], counts[1]

          if old_apps == apps and old_tests == tests and (not gov or gov in content):
              print(f"No changes needed (apps={apps}, tests={tests}, gov={gov})")
              sys.exit(0)

          print(f"Updating: apps {old_apps}->{apps}, tests {old_tests}->{tests}")

          new = content
          # data-count="N" — first two occurrences only (tests, apps)
          new = re.sub(rf'data-count="{old_tests}"', f'data-count="{tests}"', new, count=2)
          new = re.sub(rf'data-count="{old_apps}"', f'data-count="{apps}"', new, count=2)

          # Display forms — English + Turkish, with/without plus, plus meta tags.
          app_variants = [
              f'{old_apps}+ apps', f'{old_apps} apps',
              f'{old_apps}+ uygulama', f'{old_apps} uygulama',
              f'>{old_apps}+<', f'{old_apps} apps registered',
          ]
          test_variants = [
              f'{old_tests}+ tests', f'{old_tests}+ test',
              f'{old_tests}+ CI tests', f'{old_tests}+ CI test',
              f'>{old_tests}+<',
          ]
          for v in app_variants:
              new = new.replace(v, v.replace(old_apps, apps, 1))
          for v in test_variants:
              new = new.replace(v, v.replace(old_tests, tests, 1))

          # Combined meta: "N+ apps, M+ tests"
          new = new.replace(
              f'{old_apps}+ apps, {old_tests}+ tests',
              f'{apps}+ apps, {tests}+ tests',
          )

          # Governance (e.g. "70/70 governance", "All 70 gates")
          if gov:
              m = re.search(r'(\d+/\d+)(?=\s+governance)', new)
              if m:
                  old_gov = m.group(1)
                  if old_gov != gov:
                      new = new.replace(f'{old_gov} governance', f'{gov} governance')
                      new = new.replace(f'{old_gov} gates', f'{gov} gates')
                      old_n, new_n = old_gov.split('/')[0], gov.split('/')[0]
                      new = new.replace(f'All {old_n} gates', f'All {new_n} gates')

          if new == content:
              print("No textual substitutions applied (values matched attribute only)")
          file.write_text(new, encoding="utf-8")
          print(f"Updated index.html (apps={apps}, tests={tests}, gov={gov})")
          PY

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: sync live metrics (apps=${{ steps.metrics.outputs.apps }}, tests=${{ steps.metrics.outputs.tests }})"
          git push
